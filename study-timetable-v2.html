<style>
  :root {
    --ink: #0f0e0d;
    --paper: #faf8f4;

    --ps3:  #b5451b;
    --ed:   #2c5f8a;
    --emft: #2e7d4f;
    --tele: #7b3fa0;
    --dip:  #c17d11;
    --acc:  #8b2252;
    --rev:  #444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  header {
    background: var(--ink);
    color: var(--paper);
    padding: 2rem 2.5rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .header-left p {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 0.5rem;
    opacity: 0.6;
  }

  .subject-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;
    justify-content: flex-end;
    max-width: 380px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    font-size: 0.65rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    opacity: 0.85;
  }

  .legend-dot {
    width: 9px; height: 9px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* DAY NAV */
  .day-nav {
    display: flex;
    overflow-x: auto;
    border-bottom: 1px solid var(--rule);
    background: var(--cream);
    scrollbar-width: none;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .day-nav::-webkit-scrollbar { display: none; }

  .day-tab {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 0.75rem 1.3rem;
    border: none;
    background: transparent;
    cursor: pointer;
    color: #999;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: all 0.18s;
    flex-shrink: 0;
    line-height: 1.3;
  }
  .day-tab:hover { color: var(--ink); }
  .day-tab.active {
    color: var(--ink);
    border-bottom-color: var(--accent);
    background: var(--paper);
  }
  .day-tab .date-num {
    display: block;
    font-size: 1.25rem;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 0.1rem;
  }

  /* MAIN */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem 3rem;
  }

  .day-panel { display: none; }
  .day-panel.active { display: block; }

  .day-header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 2px solid var(--ink);
  }
  .day-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
  }
  .day-header .day-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #999;
  }

  /* CHIPS */
  .day-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 1.5rem;
  }
  .chip {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 0.25rem 0.65rem;
    border-radius: 20px;
    border: 1px solid var(--rule);
    background: var(--cream);
    color: #555;
  }

  /* TIMELINE */
  .timeline { display: flex; flex-direction: column; }

  .slot {
    display: grid;
    grid-template-columns: 110px 1fr;
    border-bottom: 1px solid var(--rule);
  }
  .slot:last-child { border-bottom: none; }

  .slot-time {
    font-family: 'DM Mono', monospace;
    font-size: 0.63rem;
    letter-spacing: 0.04em;
    color: #aaa;
    padding: 0.85rem 0.75rem 0.85rem 0;
    border-right: 1px solid var(--rule);
    display: flex;
    align-items: flex-start;
    padding-top: 1rem;
    line-height: 1.4;
  }

  .slot-content {
    padding: 0.75rem 0 0.75rem 1rem;
    display: flex;
    align-items: stretch;
  }

  .break-row .slot-time { color: #ccc; }
  .break-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    color: #bbb;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .break-label::before {
    content: '';
    display: inline-block;
    width: 18px; height: 1px;
    background: #ddd;
  }

  .study-block {
    width: 100%;
    border-radius: 5px;
    padding: 0.7rem 0.9rem;
    display: flex;
    gap: 0.75rem;
    align-items: flex-start;
  }

  .subj-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 0.22rem 0.5rem;
    border-radius: 3px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
    color: white;

  .block-body { flex: 1; }
  .block-title {
    font-size: 0.88rem;
    font-weight: 600;
    line-height: 1.35;
    margin-bottom: 0.3rem;
  }
  .block-topics {
    font-size: 0.78rem;
    color: #555;
    line-height: 1.5;
  }
  .block-topics li {
    list-style: none;
    padding-left: 1rem;
    position: relative;
    margin-bottom: 0.1rem;
  }
  .block-topics li::before {
    content: '·';
    position: absolute;
    left: 0.2rem;
    color: #bbb;
  }

  .block-note {
    font-size: 0.7rem;
    font-family: 'DM Mono', monospace;
    color: #aaa;
    margin-top: 0.35rem;
    letter-spacing: 0.03em;
  }

  .bg-ps3  { background: #fff0ed; } .bg-ps3  .subj-badge { background: #b5451b; }
  .bg-ed   { background: #edf4fb; } .bg-ed   .subj-badge { background: #2c5f8a; }
  .bg-emft { background: #edf7f1; } .bg-emft .subj-badge { background: #2e7d4f; }
  .bg-tele { background: #f5f0fa; } .bg-tele .subj-badge { background: #7b3fa0; }
  .bg-dip  { background: #fdf8ed; } .bg-dip  .subj-badge { background: #c17d11; }
  .bg-acc  { background: #fdf0f5; } .bg-acc  .subj-badge { background: #8b2252; }
  .bg-rev  { background: #f2f2f2; } .bg-rev  .subj-badge { background: #444;    }

  .dur-pill {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.05em;
    color: #999;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 0.15rem 0.45rem;
    margin-left: 0.5rem;
    vertical-align: middle;
    white-space: nowrap;

    border-top: 1px solid var(--rule);
    padding: 1.2rem 2.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    color: #bbb;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  @media (max-width: 600px) {
    .slot { grid-template-columns: 80px 1fr; }
    .slot-time { font-size: 0.57rem; }
  }
</style>
</head>

// ─── RENDER ──────────────────────────────────────────────────────────────────
function buildNav(){
  const nav = document.getElementById('dayNav');
  DAYS.forEach((day,i)=>{
    const btn = document.createElement('button');
    btn.className='day-tab'+(i===0?' active':'');
    btn.dataset.idx=i;
    const d = day.date.split(' ')[1];
    btn.innerHTML=`<span class="date-num">${d}</span>${day.label.slice(0,3)}`;
    btn.addEventListener('click',()=>switchDay(i));
    nav.appendChild(btn);
  });
}

function buildPanels(){
  const container = document.getElementById('panels');
  DAYS.forEach((day,i)=>{
    const panel = document.createElement('div');
    panel.className='day-panel'+(i===0?' active':'');
    panel.id='panel-'+i;

    const hdr=`<div class="day-header">
      <h2>${day.label}</h2>
      <span class="day-meta">${day.date}, 2026</span>
    </div>`;

    const chips=day.chips.map(c=>`<span class="chip">${c}</span>`).join('');
    const chipsDiv=`<div class="day-chips">${chips}</div>`;

    const slots=day.slots.map(slot=>{
      if(slot.type==='break'){
        return `<div class="slot break-row">
          <div class="slot-time">${slot.time}</div>
          <div class="slot-content"><span class="break-label">${slot.label}</span></div>
        </div>`;
      }
      const topics=(slot.topics||[]).map(t=>`<li>${t}</li>`).join('');
      const note=slot.note?`<div class="block-note">📌 ${slot.note}</div>`:'';
      const dur=slot.dur?`<span class="dur-pill">${slot.dur}</span>`:'';
      return `<div class="slot">
        <div class="slot-time">${slot.time}</div>
        <div class="slot-content">
          <div class="study-block bg-${slot.subj}">
            <span class="subj-badge">${slot.subj.toUpperCase()}</span>
            <div class="block-body">
              <div class="block-title">${slot.title}${dur}</div>
              <ul class="block-topics">${topics}</ul>
              ${note}
            </div>
          </div>
        </div>
      </div>`;
    }).join('');

    panel.innerHTML=hdr+chipsDiv+`<div class="timeline">${slots}</div>`;
    container.appendChild(panel);
  });
}

function switchDay(idx){
  document.querySelectorAll('.day-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.day-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  window.scrollTo({top:0,behavior:'smooth'});
}

buildNav();
buildPanels();
</script>
